<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- FONTE -->
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400;700&display=swap" rel="stylesheet">

    <title>Cadastro - SkinVet</title>
</head>
<body>

<header class="topbar">

    <!-- BOTÃO VOLTAR -->
    <a href="../index.html" class="btn-voltar">
        <img src="../imagens/voltar.png" alt="Voltar">
    </a>

    <!-- LOGO -->
    <a href="../index.html">
        <img src="../imagens/logo.png" alt="Logo SkinVet" class="logo-topo">
    </a>

</header>

<main class="auth-container">

    <form class="form-box">

        <h1>Cadastro</h1>

        <label>Nome</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>CPF</label>
        <input type="text" required>

        <label>Senha</label>
        <input type="password" required>

        <button type="submit">Cadastrar</button>

        <a href="login.html" class="link">Já tenho uma conta</a>

    </form>

</main>

</body>
</html>
