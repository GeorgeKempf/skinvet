<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- FONTE -->
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400;700&display=swap" rel="stylesheet">

    <title>Login - SkinVet</title>
</head>
<body>

<header class="topbar">

    <!-- BOTÃO VOLTAR -->
    <a href="../index.html" class="btn-voltar">
        <img src="../imagens/voltar.png" alt="Voltar">
    </a>

    <!-- LOGO -->
    <a href="../index.html">
        <img src="../imagens/logo.png" alt="Logo SkinVet" class="logo-topo">
    </a>

</header>

<main class="auth-container">

    <form class="form-box" id="loginForm">

        <h1>Login</h1>

        <label>Email</label>
        <input type="email" id="loginEmail" required>

        <label>Senha</label>
        <input type="password" id="loginSenha" required>

        <button type="submit">Entrar</button>

        <a href="#" class="link">Esqueceu a senha?</a>
        <a href="cadastro.html" class="link">Criar uma conta</a>

    </form>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
