<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - SkinVet</title>

    <link rel="stylesheet" href="../css/agendamento.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/meu-pet.css">
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="navbar">
        <a href="../index.html">
            <img src="../imagens/logo.png" alt="Logo SkinVet" class="logo">
        </a>

        <ul class="menu">
            <li id="userMenu"></li>
            <li id="signupMenu"></li>
        </ul>
    </div>
</header>

<main class="pet-container">
    <section class="pet-card cadastro-pet-card">
        <h1>Agendamento</h1>

        <p class="descricao-pet">
            Solicite um horário para atendimento dermatológico do seu pet.
        </p>

        <form id="agendamentoForm" class="form-pet">

            <label>Agendamento para</label>
            <div id="listaPetsAgendamento" class="lista-pets-agendamento"></div>
            <input type="hidden" id="pet-agendamento">

            <label for="data-agendamento">Data desejada</label>
            <input type="date" id="data-agendamento" required>

            <label for="horario-agendamento">Horário desejado</label>
            <input type="time" id="horario-agendamento" required>

            <label>Tipo de atendimento</label>

            <div class="tipo-agendamento">
            <label>
            <input type="radio" name="tipo-agendamento" value="Presencial">
                Presencial
            </label>

            <label>
                <input type="radio" name="tipo-agendamento" value="A domicílio">
                A domicílio
            </label>
            </div>
            <br>
            <label for="observacao-agendamento">Observação</label>
            <textarea 
                id="observacao-agendamento" 
                placeholder="Descreva brevemente o motivo da consulta"
                rows="4"
                required
            ></textarea>

            <button type="submit" class="btn-salvar-pet">
                Solicitar agendamento
            </button>

        </form>
    </section>
</main>

<div id="modalTaxaDomicilio" class="modal">
    <div class="modal-conteudo">
        <h3>Atendimento a domicílio</h3>

        <p>
            Informamos que o atendimento em domicílio possui uma taxa de deslocamento.
        </p>

        <p>Você confirma?</p>

        <div class="modal-botoes">
            <button id="confirmarDomicilio" type="button">Confirmar</button>
            <button id="cancelarDomicilio" type="button">Cancelar</button>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/agendamento.js"></script>

<!-- IMPORTANTE -->
<script src="../js/auth.js"></script>
<script src="../js/agendamento.js"></script>

</body>
</html>
