<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pet - SkinVet</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/meu-pet.css">
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="navbar">
        <a href="../index.html">
            <img src="../imagens/logo.png" alt="Logo SkinVet" class="logo">
        </a>

        <ul class="menu">
            <li id="userMenu"></li>
            <li id="signupMenu"></li>
        </ul>
    </div>
</header>

<main class="pet-container">
    <section class="pet-card">
        <h1>Meus Pets</h1>

        <p class="descricao-pet">
            Veja os pets cadastrados na sua conta e acompanhe as informações de cada animal.
        </p>

        <div class="lista-pets" id="listaPets">
            <p class="sem-pets">Nenhum pet cadastrado ainda.</p>
        </div>

        <div class="acoes-pet">
            <a href="cadastro-pet.html" class="btn-adicionar">
                Adicionar pet
            </a>

            <button class="btn-remover-geral" type="button">
                Remover pet
            </button>
        </div>
    </section>
</main>

<div id="modalMotivo" class="modal oculto">
    <div class="modal-conteudo">
        <h3>Escolha o motivo da remoção</h3>

        <label class="opcao-motivo">
            <input type="radio" name="motivo" value="Não tenho mais esse pet">
            <span>Não tenho mais esse pet</span>
        </label>

        <label class="opcao-motivo">
            <input type="radio" name="motivo" value="Não quero mais acompanhamento">
            <span>Não quero mais acompanhamento</span>
        </label>

        <label class="opcao-motivo">
            <input type="radio" name="motivo" value="Outros">
            <span>Outros</span>
        </label>

        <div class="acoes-modal">
            <button id="confirmarRemocao" type="button">Confirmar</button>
            <button id="cancelarRemocao" type="button">Cancelar</button>
        </div>
    </div>
</div>

<!-- IMPORTANTE -->
<script src="../js/auth.js"></script>
<script src="../js/meu-pet.js"></script>

</body>
</html>
