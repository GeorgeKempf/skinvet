<!-- Carrossel de Imagens -->
<div class="carousel-container">
    <div class="carousel">
        <div class="carousel-item active">
            <img src="imagens/carousel-1.jpg" alt="Dermatologia Veterinária 1">
        </div>
        <div class="carousel-item">
            <img src="imagens/carousel-2.jpg" alt="Dermatologia Veterinária 2">
        </div>
        <div class="carousel-item">
            <img src="imagens/carousel-3.jpg" alt="Dermatologia Veterinária 3">
        </div>
        <div class="carousel-item">
            <img src="imagens/carousel-4.jpg" alt="Dermatologia Veterinária 4">
        </div>
    </div>

    <!-- Botões de navegação -->
    <button class="carousel-btn prev" onclick="changeSlide(-1)">❮</button>
    <button class="carousel-btn next" onclick="changeSlide(1)">❯</button>

    <!-- Indicadores de ponto -->
    <div class="carousel-dots">
        <span class="dot active" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
    </div>
</div>
