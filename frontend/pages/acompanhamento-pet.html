<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acompanhamento do Pet - SkinVet</title>

    <link rel="stylesheet" href="../css/acompanhamento-pet.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/meu-pet.css">
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="navbar">
        <a href="../index.html">
            <img src="../imagens/logo.png" alt="Logo SkinVet" class="logo">
        </a>

        <ul class="menu">
            <li id="userMenu"></li>
            <li id="signupMenu"></li>
        </ul>
    </div>
</header>

<main class="acompanhamento-container">

    <!-- PERFIL DO PET -->
    <section class="perfil-pet-card">
        <h1 id="tituloAcompanhamento">Acompanhamento do pet</h1>

        <div class="foto-acompanhamento-container">
            <img id="fotoPet" class="foto-acompanhamento" src="../imagens/pet-padrao.png">
        </div>

        <div class="dados-pet">
            <p><strong>Espécie:</strong> <span id="especiePet"></span></p>
            <p><strong>Raça:</strong> <span id="racaPet"></span></p>
            <p><strong>Sexo:</strong> <span id="sexoPet"></span></p>
            <p><strong>Idade:</strong> <span id="idadePet"></span></p>
        </div>
    </section>

    <!-- ACOMPANHAMENTO -->
    <section class="acompanhamento-card">
        <h2>Acompanhamento dermatológico</h2>

        <div id="listaAgendamentosPet"></div>

        <p class="texto-vazio" id="mensagemSemAgendamento">
            Nenhuma atualização disponível no momento.<br>
            As informações do tratamento serão adicionadas pela Dra. Michele.
        </p>
    </section>

</main>

<div id="modalEditarAgendamento" class="modal">
    <div class="modal-conteudo">
        <h3>Editar agendamento</h3>

        <label>Nova data</label>
        <input type="date" id="editarData">

        <label>Novo horário</label>
        <input type="time" id="editarHorario">

        <label>Observação</label>
        <textarea id="editarObservacao" rows="4"></textarea>

        <div class="modal-botoes">
            <button id="confirmarEdicaoAgendamento">Salvar</button>
            <button id="cancelarEdicaoAgendamento">Cancelar</button>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/acompanhamento-pet.js"></script>

</body>
</html>
